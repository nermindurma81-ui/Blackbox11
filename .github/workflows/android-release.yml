name: Android Release

on:
  # Ručni trigger sa izborom verzije i tipa
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (npr. 1.2.0)"
        required: true
        default: "1.0.0"
      build_type:
        description: "Artifact type"
        required: true
        default: "aab"
        type: choice
        options: ["aab", "apk", "both"]
      create_release:
        description: "Napravi GitHub Release?"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]

  # Auto release na git tag v*.*.*
  push:
    tags:
      - "v*.*.*"

jobs:
  release-build:
    name: Build & Sign Release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Postavi version iz inputa ili git taga
      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version_name }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      # Decode keystore iz GitHub Secret
      - name: Setup release keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
          echo "ANDROID_KEYSTORE_PATH=$GITHUB_WORKSPACE/android/release.keystore" >> $GITHUB_ENV
          echo "ANDROID_KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "ANDROID_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "ANDROID_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> $GITHUB_ENV

      # Build AAB
      - name: Build Release AAB
        if: ${{ github.event.inputs.build_type == 'aab' || github.event.inputs.build_type == 'both' || github.event_name == 'push' }}
        run: |
          ./gradlew :app:bundleRelease --no-daemon \
            -Pversion.name=${{ steps.version.outputs.version }}

      # Build APK
      - name: Build Release APK
        if: ${{ github.event.inputs.build_type == 'apk' || github.event.inputs.build_type == 'both' }}
        run: |
          ./gradlew :app:assembleRelease --no-daemon \
            -Pversion.name=${{ steps.version.outputs.version }}

      # Run unit tests na release buildu
      - name: Run unit tests
        run: ./gradlew :app:testReleaseUnitTest --no-daemon

      # Upload AAB artifact
      - name: Upload AAB
        if: ${{ github.event.inputs.build_type == 'aab' || github.event.inputs.build_type == 'both' || github.event_name == 'push' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-v${{ steps.version.outputs.version }}
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      # Upload APK artifact
      - name: Upload APK
        if: ${{ github.event.inputs.build_type == 'apk' || github.event.inputs.build_type == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-v${{ steps.version.outputs.version }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      # Napravi GitHub Release sa APK/AAB
      - name: Create GitHub Release
        if: ${{ (github.event.inputs.create_release == 'true' || github.event_name == 'push') && secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "BlackBox MAX v${{ steps.version.outputs.version }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
