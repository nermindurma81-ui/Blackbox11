name: Android Release (manual)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "release artifact type"
        required: true
        default: "aab"
        type: choice
        options: ["aab", "apk"]

jobs:
  release-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4

      - name: Prepare release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
          echo "ANDROID_KEYSTORE_PATH=$GITHUB_WORKSPACE/android/release.keystore" >> $GITHUB_ENV
          echo "ANDROID_KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "ANDROID_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "ANDROID_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Build signed artifact
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "apk" ]; then
            ./gradlew :app:assembleRelease
          else
            ./gradlew :app:bundleRelease
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ github.event.inputs.build_type }}
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
